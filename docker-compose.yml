networks:
  naru-network:
    driver: bridge

volumes:
  mysql_data:
  ollama_data:

services:
  # ── MySQL ────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: naru-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_chatbot}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Runs automatically on first startup only (empty data dir).
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - naru-network

  # ── Ollama ───────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: naru-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks:
      - naru-network
    # ── Optional GPU passthrough (uncomment if running on a host with an
    #    NVIDIA GPU + nvidia-container-toolkit installed) ──────────────────
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # One-shot sidecar: pulls the model once, then exits. Safe to re-run —
  # `ollama pull` is a no-op if the model is already present.
  ollama-pull:
    image: ollama/ollama:latest
    container_name: naru-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull ${OLLAMA_MODEL:-llama3.1:8b}"]
    networks:
      - naru-network
    restart: "no"

  # ── Backend (Flask + LangGraph) ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: naru-backend
    restart: unless-stopped
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      OLLAMA_BASE_URL: http://ollama:11434
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_chatbot}
    ports:
      - "${BACKEND_PORT:-5001}:5001"
    volumes:
      - ./backend/vector_store:/app/backend/vector_store
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - naru-network

  # ── Frontend (React + Vite, built and served via nginx) ────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: naru-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
    networks:
      - naru-network
